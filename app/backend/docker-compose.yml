services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: budget-planner
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../..
      dockerfile: app/backend/Dockerfile
    ports:
      - "8000:8000"
    env_file: ../../.env
    environment:
      POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/budget-planner
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: budget-planner
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy

volumes:
  pgdata:
  mongodata:
