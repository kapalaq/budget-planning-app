services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: budget-planner
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    command: >
      uvicorn app:app
      --host 0.0.0.0 --port 8000
      --app-dir /app/app/backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      POSTGRES_DSN: postgresql://postgres:postgres@postgres:5432/budget-planner
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: budget-planner
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy

  telegram:
    build: .
    command: python -m telegram.bot
    env_file: .env
    environment:
      BACKEND_URL: http://backend:8000
      PYTHONPATH: /app/app
    depends_on:
      - backend

  frontend:
    build:
      context: .
      dockerfile: app/frontend/Dockerfile
    ports:
      - "3000:80"
    environment:
      BACKEND_URL: http://backend:8000
      NGINX_ENVSUBST_FILTER: BACKEND_URL
    depends_on:
      - backend

volumes:
  pgdata:
  mongodata:
